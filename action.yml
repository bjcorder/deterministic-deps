name: Deterministic Deps
author: Brian Corder
description: Static dependency determinism scanner for GitHub Actions, containers, IaC, and package manifests.

inputs:
  mode:
    description: Reporting mode. Use advisory to report only, or enforce to fail at the configured severity threshold. Defaults to advisory.
    required: false
    default: advisory
  path:
    description: Repository path to scan.
    required: false
    default: .
  config:
    description: Optional path to a deterministic-deps YAML config file.
    required: false
    default: .deterministic-deps.yml
  include:
    description: Newline or comma-separated glob patterns to include.
    required: false
    default: ''
  exclude:
    description: Newline or comma-separated glob patterns to exclude.
    required: false
    default: ''
  severity-threshold:
    description: Minimum severity that fails the action in enforce mode. Defaults to low.
    required: false
    default: low
  sarif:
    description: Whether to write a SARIF report. Defaults to true.
    required: false
    default: 'true'
  patch:
    description: Whether to write a unified diff with safe remediation suggestions. Defaults to false.
    required: false
    default: 'false'
  remote-validation:
    description: Opt in to remote validation of immutable GitHub commit references. Defaults to false.
    required: false
    default: 'false'
  remote-token-policy:
    description: Controls whether GITHUB_TOKEN may be sent during remote validation. Use auto for trusted GitHub API hosts or never to omit it. Defaults to auto.
    required: false
    default: auto
  remote-timeout-ms:
    description: Per-request timeout for remote validation. Defaults to 5000.
    required: false
    default: '5000'
  remote-retries:
    description: Retry count for transient remote validation failures. Defaults to 1.
    required: false
    default: '1'

outputs:
  finding-count:
    description: Total number of findings.
  high-count:
    description: Number of high severity findings.
  medium-count:
    description: Number of medium severity findings.
  low-count:
    description: Number of low severity findings.
  report-path:
    description: Path to the Markdown report.
  sarif-path:
    description: Path to the SARIF report, when enabled.
  patch-path:
    description: Path to the remediation patch file, when enabled.

runs:
  using: node24
  main: dist/index.js

branding:
  icon: lock
  color: blue
