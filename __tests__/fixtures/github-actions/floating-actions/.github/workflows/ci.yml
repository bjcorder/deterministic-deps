name: ci
on: pull_request
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@48b55a0
      - uses: docker://alpine:3.20
  array-runner:
    runs-on: [self-hosted, linux, ubuntu-latest]
    steps:
      - run: echo array
  matrix-runner:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
    steps:
      - run: echo matrix
  matrix-include-runner:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-latest
            node: 24
    steps:
      - run: echo matrix include
