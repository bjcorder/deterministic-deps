name: Bug report
description: Report incorrect behavior or a false positive/negative.
title: '[Bug]: '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Minimal dependency file
      description: Paste the smallest file or snippet that reproduces the issue.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Action version
      placeholder: v1.0.0 or commit SHA
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
