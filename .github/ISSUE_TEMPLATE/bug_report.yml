name: Bug report
description: Report a false positive, false negative, or action failure.
title: '[Bug]: '
labels: ['bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: declaration
    attributes:
      label: Dependency declaration
      description: Paste the relevant dependency declaration or workflow snippet.
      render: text
  - type: input
    id: version
    attributes:
      label: Action version
      placeholder: v1.0.0
